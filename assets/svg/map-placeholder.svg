<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="mp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E2A33"/>
      <stop offset="100%" stop-color="#0B0D14"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#C9A961" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#mp-bg)"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <!-- Fake streets -->
  <g stroke="#C9A961" stroke-opacity="0.22" stroke-width="3" fill="none">
    <path d="M0 180 L800 220"/>
    <path d="M0 340 L800 360"/>
    <path d="M0 480 L800 500"/>
    <path d="M200 0 L220 600"/>
    <path d="M450 0 L470 600"/>
    <path d="M620 0 L640 600"/>
  </g>
  <g stroke="#C9A961" stroke-opacity="0.1" stroke-width="1.5" fill="none">
    <path d="M0 80 L800 100"/>
    <path d="M0 260 L800 280"/>
    <path d="M0 420 L800 440"/>
    <path d="M0 560 L800 580"/>
    <path d="M100 0 L120 600"/>
    <path d="M330 0 L350 600"/>
    <path d="M550 0 L570 600"/>
    <path d="M720 0 L740 600"/>
  </g>
  <!-- Blocks -->
  <g fill="#C9A961" fill-opacity="0.06">
    <rect x="40" y="40" width="150" height="130" rx="6"/>
    <rect x="240" y="40" width="200" height="130" rx="6"/>
    <rect x="490" y="40" width="140" height="130" rx="6"/>
    <rect x="680" y="40" width="110" height="130" rx="6"/>
    <rect x="40" y="240" width="150" height="90" rx="6"/>
    <rect x="240" y="240" width="200" height="90" rx="6"/>
    <rect x="490" y="240" width="140" height="90" rx="6"/>
    <rect x="40" y="380" width="150" height="90" rx="6"/>
    <rect x="490" y="380" width="140" height="90" rx="6"/>
  </g>
  <!-- Location pulse -->
  <g transform="translate(435 265)">
    <circle r="60" fill="#E86A1C" fill-opacity="0.1">
      <animate attributeName="r" from="30" to="70" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" from="0.18" to="0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="22" fill="#E86A1C" fill-opacity="0.2"/>
    <circle r="10" fill="#E86A1C"/>
    <!-- Marigold -->
    <g transform="translate(0 -44)" fill="#E86A1C">
      <circle r="12" fill="#0B0D14"/>
      <circle r="10" fill="#E86A1C"/>
      <circle r="4" fill="#0B0D14"/>
    </g>
  </g>
  <text x="460" y="280" font-family="Cormorant Garamond, Playfair Display, serif" font-style="italic" font-size="18" fill="#F5ECD9">Mala Muerte</text>
</svg>
