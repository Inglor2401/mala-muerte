<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <g stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer petals (12) -->
    <g fill="currentColor" fill-opacity="0.18">
      <ellipse cx="32" cy="10" rx="3" ry="6"/>
      <ellipse cx="32" cy="54" rx="3" ry="6"/>
      <ellipse cx="10" cy="32" rx="6" ry="3"/>
      <ellipse cx="54" cy="32" rx="6" ry="3"/>
      <ellipse cx="16" cy="16" rx="3" ry="6" transform="rotate(45 16 16)"/>
      <ellipse cx="48" cy="16" rx="3" ry="6" transform="rotate(-45 48 16)"/>
      <ellipse cx="16" cy="48" rx="3" ry="6" transform="rotate(-45 16 48)"/>
      <ellipse cx="48" cy="48" rx="3" ry="6" transform="rotate(45 48 48)"/>
      <ellipse cx="32" cy="14" rx="2.2" ry="5" transform="rotate(22 32 14)"/>
      <ellipse cx="32" cy="50" rx="2.2" ry="5" transform="rotate(-22 32 50)"/>
      <ellipse cx="14" cy="32" rx="5" ry="2.2" transform="rotate(22 14 32)"/>
      <ellipse cx="50" cy="32" rx="5" ry="2.2" transform="rotate(-22 50 32)"/>
    </g>
    <!-- Inner ring -->
    <g fill="currentColor" fill-opacity="0.32">
      <ellipse cx="32" cy="22" rx="2.4" ry="4.5"/>
      <ellipse cx="32" cy="42" rx="2.4" ry="4.5"/>
      <ellipse cx="22" cy="32" rx="4.5" ry="2.4"/>
      <ellipse cx="42" cy="32" rx="4.5" ry="2.4"/>
      <ellipse cx="25" cy="25" rx="2.2" ry="4.2" transform="rotate(45 25 25)"/>
      <ellipse cx="39" cy="25" rx="2.2" ry="4.2" transform="rotate(-45 39 25)"/>
      <ellipse cx="25" cy="39" rx="2.2" ry="4.2" transform="rotate(-45 25 39)"/>
      <ellipse cx="39" cy="39" rx="2.2" ry="4.2" transform="rotate(45 39 39)"/>
    </g>
    <!-- Center -->
    <circle cx="32" cy="32" r="5" fill="currentColor" fill-opacity="0.5"/>
    <circle cx="32" cy="32" r="2" fill="currentColor"/>
