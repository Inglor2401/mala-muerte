<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="pg-c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E2A33"/>
      <stop offset="100%" stop-color="#0B0D14"/>
    </linearGradient>
    <radialGradient id="pg-c-glow" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#E86A1C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E86A1C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pg-c-liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E86A1C"/>
      <stop offset="100%" stop-color="#B21E2C"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#pg-c)"/>
  <rect width="400" height="500" fill="url(#pg-c-glow)"/>
  <!-- Coupe glass silhouette -->
  <g transform="translate(200 250)">
    <!-- Glass bowl -->
    <path d="M-80 -30 Q-80 40 0 50 Q80 40 80 -30 Z" fill="#C9A961" fill-opacity="0.08" stroke="#C9A961" stroke-opacity="0.35" stroke-width="1"/>
    <!-- Liquid -->
    <path d="M-72 -20 Q-72 32 0 42 Q72 32 72 -20 Z" fill="url(#pg-c-liquid)" fill-opacity="0.55"/>
    <!-- Highlight -->
    <ellipse cx="-35" cy="-8" rx="14" ry="3" fill="#F5ECD9" fill-opacity="0.18"/>
    <!-- Stem -->
    <rect x="-2" y="50" width="4" height="60" fill="#C9A961" fill-opacity="0.35"/>
    <!-- Base -->
    <ellipse cx="0" cy="115" rx="40" ry="4" fill="#C9A961" fill-opacity="0.3"/>
    <!-- Garnish: marigold petal -->
    <ellipse cx="40" cy="-30" rx="8" ry="4" fill="#E86A1C" fill-opacity="0.7" transform="rotate(-20 40 -30)"/>
    <ellipse cx="48" cy="-24" rx="6" ry="3" fill="#F4873F" fill-opacity="0.55" transform="rotate(-15 48 -24)"/>
  </g>
  <text x="200" y="420" text-anchor="middle" font-family="Cormorant Garamond, Playfair Display, serif" font-style="italic" font-size="24" fill="#C9A961" fill-opacity="0.5">Signature Cocktail</text>
  <text x="200" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="0.28em" fill="#C9A961" fill-opacity="0.35">400×500</text>
</svg>
